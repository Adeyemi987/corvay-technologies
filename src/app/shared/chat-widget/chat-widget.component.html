<!-- ── Chat Panel ── -->
@if (isOpen()) {
  <div class="chat-panel" role="dialog" aria-label="DevAssistAI Chat">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="6" width="18" height="13" rx="3" stroke="white" stroke-width="1.5"/>
            <circle cx="9" cy="12" r="1.5" fill="white"/>
            <circle cx="15" cy="12" r="1.5" fill="white"/>
            <path d="M9 9V6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M15 9V6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 6V4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="bot-name">DevAssistAI</div>
          <div class="bot-status">
            <span class="status-dot"></span>
            Demo · Powered by Corvay
          </div>
        </div>
      </div>
      <div class="header-right">
        <span class="demo-badge">DEMO</span>
        <button class="close-btn" (click)="toggleChat()" aria-label="Close chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-container" #messagesContainer>
      @for (msg of messages(); track msg.id) {
        <div class="message-row" [class.user-row]="msg.role === 'user'">
          @if (msg.role === 'assistant') {
            <div class="msg-avatar assistant-avatar">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="6" width="18" height="13" rx="3" stroke="white" stroke-width="1.5"/>
                <circle cx="9" cy="12" r="1.5" fill="white"/>
                <circle cx="15" cy="12" r="1.5" fill="white"/>
              </svg>
            </div>
          }
          <div
            class="message-bubble"
            [class.assistant-bubble]="msg.role === 'assistant'"
            [class.user-bubble]="msg.role === 'user'"
            [innerHTML]="formatMessage(msg.text)"
          ></div>
        </div>
      }

      <!-- Typing indicator -->
      @if (isTyping()) {
        <div class="message-row">
          <div class="msg-avatar assistant-avatar">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="6" width="18" height="13" rx="3" stroke="white" stroke-width="1.5"/>
              <circle cx="9" cy="12" r="1.5" fill="white"/>
              <circle cx="15" cy="12" r="1.5" fill="white"/>
            </svg>
          </div>
          <div class="message-bubble assistant-bubble typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      }
    </div>

    <!-- Suggested prompts (shown only when 1 message = initial greeting) -->
    @if (messages().length === 1) {
      <div class="suggestions">
        <button class="suggestion-chip" (click)="onInputChange('What is DevAssistAI?'); sendMessage()">
          What is DevAssistAI?
        </button>
        <button class="suggestion-chip" (click)="onInputChange('Tell me about your products'); sendMessage()">
          Your products
        </button>
        <button class="suggestion-chip" (click)="onInputChange('How do I embed it?'); sendMessage()">
          How to integrate?
        </button>
        <button class="suggestion-chip" (click)="onInputChange('Pricing plans'); sendMessage()">
          Pricing
        </button>
      </div>
    }

    <!-- Input -->
    <div class="chat-input-area">
      <textarea
        class="chat-input"
        placeholder="Ask about our products or DevAssistAI..."
        rows="1"
        [value]="userInput()"
        (input)="onInputChange($any($event.target).value)"
        (keydown)="handleKeydown($event)"
        [disabled]="isTyping()"
      ></textarea>
      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="!userInput().trim() || isTyping()"
        aria-label="Send message"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <p class="powered-by">Powered by <strong>Corvay DevAssistAI</strong> · <span class="demo-text">Demo Mode</span></p>
  </div>
}

<!-- ── Floating Trigger Button ── -->
<button
  class="chat-trigger"
  (click)="toggleChat()"
  [attr.aria-label]="isOpen() ? 'Close chat' : 'Open DevAssistAI chat'"
>
  @if (!isOpen()) {
    <div class="trigger-pulse"></div>
    <div class="trigger-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="6" width="18" height="13" rx="3" stroke="white" stroke-width="1.8"/>
        <circle cx="9" cy="12" r="1.5" fill="white"/>
        <circle cx="15" cy="12" r="1.5" fill="white"/>
        <path d="M9 9V6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M15 9V6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M12 6V4" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="trigger-label">DevAssistAI</span>
  } @else {
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="22" height="22">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  }
</button>
